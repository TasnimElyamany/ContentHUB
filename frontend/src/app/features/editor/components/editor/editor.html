<div class="editor-container">
  <!-- Top Toolbar -->
  <mat-toolbar class="editor-toolbar">
    <button mat-icon-button (click)="goBack()" matTooltip="Back to dashboard">
      <mat-icon>arrow_back</mat-icon>
    </button>

    <div class="title-group">
      <mat-icon class="title-icon">description</mat-icon>
      <input
        [ngModel]="title()"
        (ngModelChange)="title.set($event); OnTitleChanged()"
        (focus)="onTitleFocus($event)"
        (blur)="onTitleBlur()"
        class="document-title"
        placeholder="Untitled Document">
    </div>

    <span class="spacer"></span>

    <!-- Save Status -->
    <button
      mat-button
      class="save-btn"
      (click)="saveDocument()"
      [disabled]="saveStatus() === 'saving'"
      matTooltip="Save (Ctrl+S)">
      <mat-icon [class]="'status-icon ' + saveStatus()">{{ saveStatusIcon }}</mat-icon>
      <span class="status-text">{{ saveStatusText }}</span>
    </button>

    <!-- Actions -->
    <button mat-icon-button [matMenuTriggerFor]="shareMenu" matTooltip="Share">
      <mat-icon>share</mat-icon>
    </button>
    <mat-menu #shareMenu="matMenu">
      <button mat-menu-item (click)="copyDocumentLink()">
        <mat-icon>link</mat-icon>
        <span>Copy link</span>
      </button>
      <button mat-menu-item (click)="shareDocument()">
        <mat-icon>email</mat-icon>
        <span>Email</span>
      </button>
      <button mat-menu-item>
        <mat-icon>people</mat-icon>
        <span>Invite collaborators</span>
      </button>
    </mat-menu>

    <button mat-icon-button [matMenuTriggerFor]="exportMenu" matTooltip="Export">
      <mat-icon>download</mat-icon>
    </button>
    <mat-menu #exportMenu="matMenu">
      <button mat-menu-item (click)="exportDocument('pdf')">
        <mat-icon>picture_as_pdf</mat-icon>
        <span>Export as PDF</span>
      </button>
      <button mat-menu-item (click)="exportDocument('docx')">
        <mat-icon>description</mat-icon>
        <span>Export as DOCX</span>
      </button>
      <button mat-menu-item (click)="exportDocument('markdown')">
        <mat-icon>code</mat-icon>
        <span>Export as Markdown</span>
      </button>
    </mat-menu>

    <button
      mat-button
      class="publish-btn"
      [class]="'publish-btn status-' + status()"
      (click)="publishDocument()"
      [matTooltip]="status() === 'published' ? 'Unpublish' : 'Publish document'">
      <mat-icon>{{ status() === 'published' ? 'public' : 'public_off' }}</mat-icon>
      <span>{{ status() === 'published' ? 'Published' : 'Draft' }}</span>
    </button>

    <button
      mat-icon-button
      (click)="toggleComments()"
      matTooltip="Comments"
      [matBadge]="commentCount()"
      [matBadgeHidden]="commentCount() === 0"
      matBadgeColor="warn">
      <mat-icon>comment</mat-icon>
    </button>

    <button
      mat-flat-button
      class="ai-btn"
      [class.active]="showAIPanel()"
      (click)="toggleAIPanel()"
      matTooltip="AI Assistant">
      <mat-icon>auto_awesome</mat-icon>
      <span class="ai-btn-text">AI</span>
    </button>
  </mat-toolbar>

  <!-- Main Editor Area with Sidebars -->
  <div class="editor-content">
    <!-- Left Sidebar (Comments) -->
    @if (showComments()) {
      <div class="comments-sidebar">
        <div class="sidebar-header">
          <h3>Comments</h3>
          <button mat-icon-button (click)="toggleComments()">
            <mat-icon>close</mat-icon>
          </button>
        </div>
        <app-comments-sidebar
          [documentId]="documentId()"
          (countChange)="onCommentCountChange($event)">
        </app-comments-sidebar>
      </div>
    }

    <!-- Editor -->
    <div class="editor-main">
      <div class="editor-wrapper">
        <quill-editor
          [ngModel]="content()"
          (ngModelChange)="OnContentChanged({html: $event})"
          (onEditorCreated)="onEditorCreated($event)"
          [modules]="quillModules"
          placeholder="Start writing your amazing content..."
          class="quill-editor">
        </quill-editor>
      </div>

      <!-- Bottom Bar -->
      <div class="editor-footer">
        <div class="footer-left">
          <span class="word-count">
            <mat-icon>text_fields</mat-icon>
            {{ wordCount }} words
          </span>
          <span class="char-count">
            {{ characterCount }} characters
          </span>
        </div>
        <div class="footer-right">
          @if (collaborators().length > 0) {
            <div class="collaborators">
              <mat-icon>people</mat-icon>
              <span>{{ collaborators().length }} online</span>
            </div>
          }
        </div>
      </div>
    </div>

    <!-- Right Sidebar (AI Panel) -->
    @if (showAIPanel()) {
      <app-ai-panel
        [documentId]="documentId()"
        [quillInstance]="quillInstance"
        (close)="toggleAIPanel()"
        (contentChanged)="onAIContentChanged()">
      </app-ai-panel>
    }
  </div>
</div>
